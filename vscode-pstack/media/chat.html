<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src 'unsafe-inline'; script-src 'nonce-{{NONCE}}';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PortalUP Chat</title>
  <style>
    :root {
      --bg: var(--vscode-editor-background);
      --fg: var(--vscode-editor-foreground);
      --input-bg: var(--vscode-input-background);
      --input-fg: var(--vscode-input-foreground);
      --input-border: var(--vscode-input-border);
      --btn-bg: var(--vscode-button-background);
      --btn-fg: var(--vscode-button-foreground);
      --btn-hover: var(--vscode-button-hoverBackground);
      --user-bg: var(--vscode-inputValidation-infoBackground, #1e3a5f);
      --tool-fg: var(--vscode-descriptionForeground);
      --separator: var(--vscode-editorGroup-border);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--vscode-font-family, monospace);
      font-size: var(--vscode-font-size, 13px);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg {
      max-width: 88%;
      padding: 8px 12px;
      border-radius: 6px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }
    .msg.user { align-self: flex-end; background: var(--user-bg); }
    .msg.assistant { align-self: flex-start; }
    .msg.tool-indicator {
      align-self: flex-start;
      color: var(--tool-fg);
      font-style: italic;
      font-size: 0.9em;
      padding: 2px 8px;
    }
    .msg.error { color: var(--vscode-errorForeground); align-self: flex-start; }
    #input-row {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid var(--separator);
      background: var(--bg);
    }
    #user-input {
      flex: 1;
      background: var(--input-bg);
      color: var(--input-fg);
      border: 1px solid var(--input-border, transparent);
      border-radius: 4px;
      padding: 7px 10px;
      resize: none;
      font-family: inherit;
      font-size: inherit;
      min-height: 36px;
      max-height: 140px;
      overflow-y: auto;
    }
    #user-input:focus { outline: 1px solid var(--vscode-focusBorder); }
    #send-btn {
      background: var(--btn-bg);
      color: var(--btn-fg);
      border: none;
      border-radius: 4px;
      padding: 0 14px;
      cursor: pointer;
      font-size: inherit;
      align-self: flex-end;
      height: 36px;
    }
    #send-btn:hover { background: var(--btn-hover); }
    #send-btn:disabled { opacity: 0.5; cursor: default; }
    .spinner { opacity: 0.6; }
  </style>
</head>
<body>
  <div id="messages"></div>
  <div id="input-row">
    <textarea id="user-input" placeholder="Ask PortalUP… (Shift+Enter for newline)" rows="1"></textarea>
    <button id="send-btn">Send</button>
  </div>

  <script nonce="{{NONCE}}">
    const vscode = acquireVsCodeApi();
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    let assistantMsgEl = null;
    let assistantText = '';

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function appendMessage(role, text) {
      const el = document.createElement('div');
      el.className = 'msg ' + role;
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    function appendToolIndicator(text) {
      const el = document.createElement('div');
      el.className = 'msg tool-indicator';
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    function send() {
      const text = inputEl.value.trim();
      if (!text) return;
      appendMessage('user', text);
      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;
      assistantMsgEl = null;
      assistantText = '';
      vscode.postMessage({ type: 'user_message', text });
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
    });

    window.addEventListener('message', (event) => {
      const msg = event.data;
      switch (msg.type) {
        case 'chunk':
          if (!assistantMsgEl) {
            assistantMsgEl = document.createElement('div');
            assistantMsgEl.className = 'msg assistant';
            messagesEl.appendChild(assistantMsgEl);
          }
          assistantText += msg.chunk;
          assistantMsgEl.textContent = assistantText;
          messagesEl.scrollTop = messagesEl.scrollHeight;
          break;
        case 'tool_indicator':
          appendToolIndicator(msg.text);
          break;
        case 'done':
          sendBtn.disabled = false;
          assistantMsgEl = null;
          assistantText = '';
          break;
        case 'error':
          appendMessage('error', msg.text);
          sendBtn.disabled = false;
          break;
      }
    });
  </script>
</body>
</html>
